<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempo Produzione</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
            color: #1f2937;
        }

        .container {
            max-width: 700px;
            margin: 20px auto;
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }

        label {
            font-weight: 600;
            margin-top: 12px;
            display: block;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            background: #f9fafb;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #2563eb;
            background: white;
        }

        /* BUTTONS */
        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Dashboard button */
        .top-btn {
            background: #64748b;
            color: white;
        }

        .top-btn:hover {
            background: #475569;
        }

        /* CALCOLA */
        button:nth-of-type(1) {
            background: #2563eb;
            color: white;
        }

        button:nth-of-type(1):hover {
            background: #1d4ed8;
        }

        /* AGGIUNGI */
        button:nth-of-type(2) {
            background: #22c55e;
            color: white;
        }

        button:nth-of-type(2):hover {
            background: #16a34a;
        }

        /* RESULTS */
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 10px;
            font-size: 15px;
        }

        /* STATUS */
        #stato.ok {
            color: #16a34a;
            font-weight: bold;
        }

        #stato.late {
            color: #dc2626;
            font-weight: bold;
        }

        .grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* tablet / desktop */
        @media (min-width: 900px) {
            .grid {
                flex-direction: row;
                align-items: flex-start;
            }

            .container {
                flex: 1;
            }
        }

        * {
            box-sizing: border-box;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn-pressed {
            transform: scale(0.96);
            opacity: 0.7;
            transition: 0.1s;
        }

        .calcolabtn:active {
            transform: scale(0.96);
        }

        #stopTime {
            font-size: 20px;
            font-weight: bold;
            color: #dc2626;
        }

        #tempoDisponibile {
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
        }

        /* CARD */
        .modal-content {
            background: #ffffff;
            border-radius: 16px;
            max-width: 420px;
            margin: 8% auto;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            animation: pop 0.2s ease;
        }

        @keyframes pop {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* HEADER */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 20px;
        }

        .modal-header span {
            cursor: pointer;
            font-size: 20px;
        }

        /* STOP BOX */
        .stop-box {
            text-align: center;
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            background: #fee2e2;
        }

        .stop-box p {
            margin: 0;
            font-size: 13px;
            color: #991b1b;
        }

        .stop-box h1 {
            margin: 5px 0 0;
            font-size: 36px;
            color: #dc2626;
        }

        /* STATUS */
        .status-box {
            margin-top: 15px;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* GREEN */
        .status-ok {
            background: #dcfce7;
            color: #166534;
        }

        /* RED */
        .status-late {
            background: #fee2e2;
            color: #991b1b;
        }

        /* DETAILS */
        .details {
            margin-top: 15px;
            font-size: 14px;
        }

        .details p {
            margin: 6px 0;
        }

        .modal-content {
            font-size: 17px;
            line-height: 1.5;
        }

        .modal-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .stop-box h1 {
            font-size: 36px;
            font-weight: 800;
        }

        .details p {
            font-size: 16px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 800;
            color: #1f2937;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            border-left: 4px solid #2563eb;
            padding-left: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>

        function autoFillMacchina() {
            let macchina = document.getElementById("macchina").value;

            if (!macchina) {
                document.getElementById("linea").value = "";
                document.getElementById("tramoggia").value = "";
                return;
            }

            let dati = macchineData[macchina];

            if (dati) {
                document.getElementById("linea").value = dati.linea;
                document.getElementById("tramoggia").value = dati.tramoggia;
            }
        }

        function updateColori() {

            let coloreSelect = document.getElementById("colore");

            coloreSelect.innerHTML = '<option value="">Seleziona colore</option>';

            if (!materiali[f]) return;

            for (let c in materiali[f]) {
                let opt = document.createElement("option");
                opt.value = c;
                opt.textContent = c;
                coloreSelect.appendChild(opt);
            }
        }

        // ✅ MAIN CALCULATION
        function calcola() {
            let macchina = document.getElementById("macchina").value;
            let serbatoio = document.getElementById("serbatoio").value;

            let lineaL = parseFloat(document.getElementById("linea").value) || 0;
            let tramoggiaL = parseFloat(document.getElementById("tramoggia").value) || 0;
            let densita = parseFloat(document.getElementById("densita").value);
            let grammi = parseFloat(document.getElementById("grammi").value);
            let ciclo = parseFloat(document.getElementById("ciclo").value);

            // optional: notify dashboard system
            localStorage.setItem("lastUpdate", Date.now());

            // ✅ VALIDATION
            if (!macchina) {
                alert("Seleziona macchina!");
                return;
            }

            if (!densita || !grammi || !ciclo) {
                alert("Inserisci tutti i valori!");
                return;
            }

            // Litri → Kg
            let kgLinea = lineaL * densita;
            let kgTramoggia = tramoggiaL * densita;
            let totale = kgLinea + kgTramoggia;

            // Grammi → Kg
            let kgPerPezzo = grammi / 1000;

            // Pezzi
            let pezzi = totale / kgPerPezzo;

            // Tempo produzione
            let tempoSecondi = pezzi * ciclo;
            let ore = Math.floor(tempoSecondi / 3600);
            let minuti = Math.floor((tempoSecondi % 3600) / 60);

            let now = new Date();

            let inputTime = document.getElementById("fineOrario").value || "21:00";

            let [h, m] = inputTime.includes(":")
                ? inputTime.split(":").map(Number)
                : [Number(inputTime), 0];

            let deadline = new Date();
            deadline.setHours(h, m, 0, 0);

            // ❌ NO next-day logic

            let tempoDisponibile = Math.floor((deadline - now) / 1000);

            let stato = "";

            // ⛔ if deadline already passed
            if (tempoDisponibile <= 0) {
                stato = "❌ Orario già passato";
                tempoDisponibile = 0;
            } else if (tempoSecondi > tempoDisponibile) {
                stato = "❌ NON finisce in tempo";
            } else {
                stato = "✅ Finisce prima dell'orario impostato";
            }

            let oreDisp = Math.floor(tempoDisponibile / 3600);
            let minDisp = Math.floor((tempoDisponibile % 3600) / 60);

            // ⛔ STOP TIME
            let stopTime = new Date(deadline.getTime() - tempoSecondi * 1000);

            let stopOre = String(stopTime.getHours()).padStart(2, '0');
            let stopMin = String(stopTime.getMinutes()).padStart(2, '0');

            if (tempoSecondi > tempoDisponibile) {
                document.getElementById("stopTime").innerText = "--";
            }

            // document.getElementById("risultati").style.border = "2px solid #22c55e";

            // MODAL UI
            let modal = document.getElementById("resultModal");

            modal.querySelector("#pezzi").innerText = pezzi.toFixed(0);
            modal.querySelector("#tempo").innerText = ore + "h " + minuti + "min";
            modal.querySelector("#tempoDisponibile").innerText = oreDisp + "h " + minDisp + "min";
            modal.querySelector("#stato").innerText = stato;
            modal.querySelector("#stopTime").innerText = stopOre + ":" + stopMin;

            let statoEl = modal.querySelector("#stato");
            let statoBox = modal.querySelector("#statoBox");

            // text already set above, now just styling
            statoEl.classList.remove("ok", "late");

            if (stato.includes("❌")) {
                statoEl.classList.add("late");
                statoBox.classList.remove("status-ok");
                statoBox.classList.add("status-late");
            } else {
                statoEl.classList.add("ok");
                statoBox.classList.remove("status-late");
                statoBox.classList.add("status-ok");
            }

            openModal();
        }

        function openModal() {
            document.getElementById("resultModal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("resultModal").style.display = "none";
        }

        // 💾 SAVE DATA (FIXED)
        function aggiungi() {
            if (!calcoloFatto) {
                alert("Devi prima fare CALCOLA!");
                return;
            }

            let macchina = document.getElementById("macchina").value;
            let serbatoio = document.getElementById("serbatoio").value;

            let lineaL = parseFloat(document.getElementById("linea").value) || 0;
            let tramoggiaL = parseFloat(document.getElementById("tramoggia").value) || 0;
            let densita = parseFloat(document.getElementById("densita").value);
            let grammi = parseFloat(document.getElementById("grammi").value);
            let ciclo = parseFloat(document.getElementById("ciclo").value);

            if (!macchina || !densita || !grammi || !ciclo) {
                alert("Prima fai CALCOLA!");
                return;
            }

            let kgLinea = lineaL * densita;
            let kgTramoggia = tramoggiaL * densita;
            let totale = kgLinea + kgTramoggia;

            let kgPerPezzo = grammi / 1000;
            let pezzi = totale / kgPerPezzo;

            let tempoSecondi = pezzi * ciclo;
            let ore = Math.floor(tempoSecondi / 3600);
            let minuti = Math.floor((tempoSecondi % 3600) / 60);

            let inputTime = document.getElementById("fineOrario").value || "21:00";
            let [h, m] = inputTime.split(":").map(Number);

            let deadline = new Date();
            deadline.setHours(h, m, 0, 0);

            let stopTime = new Date(Date.now() + tempoSecondi * 1000);
            let stopOre = String(stopTime.getHours()).padStart(2, '0');
            let stopMin = String(stopTime.getMinutes()).padStart(2, '0');

            let key = `${macchina}_${serbatoio}_${grammi}_${ciclo}_${densita}`;

            let lista = JSON.parse(localStorage.getItem("produzione")) || [];

            let exists = lista.some(item => item.key === key);

            if (exists) {
                alert("❌ Questa produzione esiste già!");
                return;
            }

            let dato = {
                id: crypto.randomUUID(),
                key,
                macchina,
                serbatoio: serbatoio || "-",
                pezzi: pezzi.toFixed(0),
                tempo: ore + "h " + minuti + "min",
                stop: `${stopOre}:${stopMin}`,
                stato: tempoSecondi > ((deadline - new Date()) / 1000)
                    ? "❌ NON finisce in tempo"
                    : "✅ Finisce prima"
            };

            lista.push(dato);
            localStorage.setItem("produzione", JSON.stringify(lista));

            alert("✅ Aggiunto alla dashboard");
        }

        let materialiCorrenti = {};

        function updateMateriali() {
            let f = document.getElementById("fornitore").value;
            let c = document.getElementById("colore").value;
            let matSelect = document.getElementById("materiale");

            matSelect.innerHTML = '<option value="">Seleziona materiale</option>';
            document.getElementById("searchMateriale").value = "";

            if (!materiali[f] || !materiali[f][c]) return;

            materialiCorrenti = materiali[f][c];

            for (let m in materialiCorrenti) {
                let opt = document.createElement("option");
                opt.value = m;
                opt.textContent = m;
                matSelect.appendChild(opt);
            }
        }

        function searchMaterialeFast(input) {
            input = input.trim().toUpperCase();

            if (!input) return [];

            let isNumber = !isNaN(input);

            let userDensity = parseFloat(input);
            if (isNumber && userDensity > 1) {
                userDensity = userDensity / 1000;
            }

            return materialiList.filter(m => {
                // match code
                if (m.codice.includes(input)) return true;

                // match density
                if (isNumber && m.densita === userDensity) return true;

                return false;
            });
        }

        function mostraSceltaMateriali(lista) {
            let box = document.getElementById("materialInfo");
            box.innerHTML = "<p>Seleziona materiale:</p>";

            lista.forEach(m => {
                let card = document.createElement("div");

                card.style.padding = "12px";
                card.style.marginBottom = "8px";
                card.style.background = "#f9fafb";
                card.style.border = "1px solid #e5e7eb";
                card.style.borderRadius = "10px";
                card.style.cursor = "pointer";
                card.style.transition = "0.2s";

                card.innerHTML = `
            <strong>${m.codice}</strong><br>
            Densità: ${m.densita * 1000}<br>
            ${m.fornitore} • ${m.colore}
        `;

                card.onmouseover = () => card.style.background = "#e0f2fe";
                card.onmouseout = () => card.style.background = "#f9fafb";

                card.onclick = () => fillMaterial(m);

                box.appendChild(card);
            });
        }

        function fillMaterial(m) {
            document.getElementById("densita").value = m.densita;

            document.getElementById("materialBox").style.display = "block";

            document.getElementById("d_codice").innerText = m.codice;
            document.getElementById("d_densita").innerText = m.densita * 1000;
            document.getElementById("d_fornitore").innerText = m.fornitore;
            document.getElementById("d_colore").innerText = m.colore;
            document.getElementById("d_note").innerText = m.note || "-";

            // clear suggestion box
            document.getElementById("materialInfo").innerHTML = "";
        }

        function getOrarioFine() {
            let input = document.getElementById("fineOrario").value;

            if (!input) return null;

            let [ore, minuti] = input.split(":").map(Number);

            return { ore, minuti };
        }

        document.getElementById("fineOrario").addEventListener("input", function () {
            let v = this.value.replace(/\D/g, "");

            if (v.length >= 3) {
                this.value = v.slice(0, 2) + ":" + v.slice(2, 4);
            } else {
                this.value = v;
            }
        });

        function liveSearchMateriale() {
            let input = document.getElementById("materiale").value;
            let box = document.getElementById("suggestions");

            box.innerHTML = "";

            let results = searchMaterialeFast(input);

            if (results.length === 0) {
                box.style.display = "none";
                return;
            }

            results.slice(0, 10).forEach(m => {
                let div = document.createElement("div");

                div.style.padding = "8px";
                div.style.cursor = "pointer";
                div.innerText = `${m.codice} | ${m.densita * 1000}`;

                div.onclick = () => {
                    fillMaterial(m);
                    box.style.display = "none";
                };

                box.appendChild(div);
            });

            box.style.display = results.length ? "block" : "none";
        }


        document.addEventListener("click", function (e) {
            let box = document.getElementById("suggestions");

            if (!e.target.closest("#materiale")) {
                box.style.display = "none";
            }
        });

        let materialiList = Object.entries(materialiFlat).map(([codice, data]) => ({
            codice,
            ...data
        }));

        function getMaterialByCode(code) {
            return materialiFlat[code.toUpperCase()] || null;
        }

        function toggleDetails(event) {
            let box = document.getElementById("extraDetails");
            let btn = event.currentTarget;

            let isOpen = box.style.display === "block";

            box.style.display = isOpen ? "none" : "block";
            btn.innerText = isOpen ? "Dettagli" : "Nascondi Dettagli";
        }

        document.getElementById("fineOrario").addEventListener("change", function () {
            calcola();
        });

        document.querySelectorAll("input, select").forEach(el => {
            el.addEventListener("input", () => {
                calcoloFatto = false;
            });
        });

        function logout() {
            localStorage.removeItem("loggedIn");
            window.location.href = "login.html";
        }

    </script>

    <div id="resultModal" class="modal">
        <div class="modal-content">

            <div class="modal-header">
                <span onclick="closeModal()">✖</span>
                <h2 style="text-align: center;">Risultati</h2>
            </div>

            <!-- STOP TIME (MAIN) -->
            <div class="stop-box">
                <p>⛔ STOP MATERIALE ENTRO</p>
                <h1 id="stopTime"></h1>
            </div>

            <!-- STATUS -->
            <div id="statoBox" class="status-box">
                <span id="stato"></span>
            </div>

            <!-- DETAILS -->
            <div class="details">
                <p><strong>Stampate:</strong> <span id="pezzi"></span></p>
                <p><strong>Tempo Per Svuotare:</strong> <span id="tempo"></span></p>
                <p><strong>Tempo Disponibile:</strong> <span id="tempoDisponibile"></span></p>
            </div>

        </div>
    </div>
</body>
